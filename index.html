<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋼板切割排版計算器 (2D Bin Packing)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置 Tailwind 以支援 Class 模式的 Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .canvas-container { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        /* Canvas 保持白色底，模擬圖紙 */
        canvas { width: 100%; height: auto; display: block; background-color: #fff; }
        
        /* 載入動畫 */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Modal 動畫 */
        .modal { transition: opacity 0.25s ease; pointer-events: none; opacity: 0;}
        .modal.active { opacity: 1; pointer-events: auto; }
        body.modal-active { overflow-x: hidden; overflow-y: hidden; }
        
        /* 表格列閃爍動畫 */
        @keyframes highlight {
            0% { background-color: #3b82f6; opacity: 0.5; }
            100% { background-color: transparent; opacity: 1; }
        }
        .row-highlight {
            animation: highlight 1s ease-out;
        }
    </style>
</head>
<body class="text-gray-800 bg-gray-100 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">

    <!-- 標題區 -->
    <header class="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-50 dark:bg-slate-900">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold flex items-center">
                <i class="fas fa-layer-group mr-2"></i>鋼板切割排版計算器
                <span class="ml-2 text-xs md:text-sm bg-slate-700 px-2 py-1 rounded font-normal hidden sm:inline-block">V2.17 深夜模式版</span>
            </h1>
            
            <div class="flex items-center gap-3">
                <!-- 深夜模式切換按鈕 -->
                <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-700 transition focus:outline-none" title="切換日/夜模式">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 左側：輸入控制區 -->
            <div class="lg:col-span-1 space-y-6">
                
                <!-- 1. 母材設定 -->
                <div class="bg-white p-5 rounded-lg shadow border-l-4 border-blue-500 dark:bg-gray-800 dark:border-blue-600 transition-colors">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold flex items-center text-gray-800 dark:text-gray-100">
                            <i class="fas fa-border-all mr-2 text-blue-500"></i>母材庫存設定
                        </h2>
                        <button onclick="addMasterSheetRow()" class="text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1 rounded transition dark:bg-blue-900 dark:text-blue-200 dark:hover:bg-blue-800">
                            <i class="fas fa-plus mr-1"></i>新增規格
                        </button>
                    </div>
                    
                    <div class="space-y-3" id="masterSheetsList">
                        <!-- 母材列表容器 -->
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                        <label class="block text-sm font-medium text-gray-700 mb-1 dark:text-gray-300">裁切損耗(mm)</label>
                        <input type="number" id="kerfSize" value="3" inputmode="decimal" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-gray-500 outline-none transition bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="例如: 3">
                        <p class="text-xs text-gray-500 mt-1 dark:text-gray-400">* 系統將自動選擇最適合的母材尺寸進行排版</p>
                    </div>
                </div>

                <!-- 2. 零件清單 -->
                <div class="bg-white p-5 rounded-lg shadow border-l-4 border-green-500 dark:bg-gray-800 dark:border-green-600 transition-colors">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold flex items-center text-gray-800 dark:text-gray-100">
                            <i class="fas fa-th-list mr-2 text-green-500"></i>零件清單
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="clearParts()" class="text-xs bg-red-100 text-red-700 hover:bg-red-200 px-3 py-1 rounded transition dark:bg-red-900 dark:text-red-200 dark:hover:bg-red-800">
                                <i class="fas fa-trash-alt mr-1"></i>清空
                            </button>
                            <button onclick="addPartRow()" class="text-xs bg-green-100 text-green-700 hover:bg-green-200 px-3 py-1 rounded transition dark:bg-green-900 dark:text-green-200 dark:hover:bg-green-800">
                                <i class="fas fa-plus mr-1"></i>新增
                            </button>
                        </div>
                    </div>
                    
                    <div class="w-full overflow-y-auto max-h-[500px] scrollbar-thin">
                        <table class="w-full text-sm text-left table-fixed">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50 sticky top-0 z-10 dark:bg-gray-700 dark:text-gray-300">
                                <tr>
                                    <th class="px-1 py-2 w-[10%] text-center">#</th>
                                    <th class="px-1 py-2 w-[25%]">寬 (W)</th>
                                    <th class="px-1 py-2 w-[25%]">高 (H)</th>
                                    <th class="px-1 py-2 w-[20%] text-center">數量</th>
                                    <th class="px-1 py-2 w-[20%] text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="partsTableBody" class="dark:text-gray-300">
                                <!-- 預設清空，由 JS 初始化一列 -->
                            </tbody>
                        </table>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="addPartRow()" class="w-1/2 py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded hover:border-green-500 hover:text-green-500 transition dark:border-gray-600 dark:text-gray-400 dark:hover:text-green-400 dark:hover:border-green-500">
                            + 新增一行
                        </button>
                        <button id="calcBtn" onclick="startCalculation()" class="w-1/2 py-2 bg-blue-600 text-white rounded font-bold hover:bg-blue-700 shadow-lg transition transform active:scale-95 flex justify-center items-center dark:bg-blue-700 dark:hover:bg-blue-600">
                            <i class="fas fa-calculator mr-2"></i>開始計算
                        </button>
                    </div>
                </div>

                <!-- 統計結果摘要 -->
                <div id="summaryCard" class="bg-slate-800 text-white p-5 rounded-lg shadow hidden dark:bg-slate-900 transition-colors">
                    <h3 class="text-lg font-bold mb-3 border-b border-slate-600 pb-2">計算結果總覽</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center bg-slate-700 p-2 rounded dark:bg-slate-800">
                            <span>所需母材總數：</span>
                            <span class="font-bold text-2xl text-yellow-400" id="resTotalBins">0</span>
                        </div>
                        
                        <!-- 詳細統計區 -->
                        <div id="sheetBreakdown" class="bg-slate-700 bg-opacity-50 p-3 rounded text-sm space-y-2 dark:bg-slate-800 dark:bg-opacity-50">
                            <!-- JS 動態插入 -->
                        </div>

                        <div class="grid grid-cols-3 gap-2 text-sm border-t border-slate-600 pt-2">
                            <div class="flex flex-col">
                                <span class="text-gray-400">總利用率</span>
                                <span class="font-bold text-lg" id="resEfficiency">0%</span>
                            </div>
                            <div class="flex flex-col text-center">
                                <span class="text-gray-400">使用面積</span>
                                <span class="font-bold text-lg" id="resUsedArea">0 m²</span>
                            </div>
                            <div class="flex flex-col text-right">
                                <span class="text-gray-400">廢料面積</span>
                                <span class="font-bold text-lg" id="resWaste">0 m²</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 錯誤/警告訊息區 -->
                <div id="errorLog" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 text-sm rounded shadow-sm dark:bg-red-900 dark:text-red-200 dark:border-red-400"></div>

            </div>

            <!-- 右側：視覺化結果 -->
            <div class="lg:col-span-2">
                <div id="resultsArea" class="space-y-4">
                    <!-- 預設顯示畫面 -->
                    <div class="bg-white p-10 rounded-lg shadow text-center text-gray-400 min-h-[400px] flex flex-col justify-center items-center dark:bg-gray-800 dark:text-gray-500 transition-colors">
                        <i class="fas fa-cube text-6xl mb-4 text-gray-300 dark:text-gray-600"></i>
                        <p class="text-lg font-medium">請輸入尺寸並點擊「開始計算」</p>
                        <p class="text-sm opacity-75">計算後將顯示配置清單</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- 拆解選擇 Modal -->
    <div id="autoSplitModal" class="modal fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50 backdrop-blur-sm" onclick="closeAutoSplitModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto transform transition-all scale-100 dark:bg-gray-800 dark:text-gray-100">
            <div class="modal-content py-4 text-left px-6">
                <div class="flex justify-between items-center pb-3 border-b dark:border-gray-700">
                    <p class="text-xl font-bold text-gray-700 dark:text-gray-100"><i class="fas fa-cut mr-2 text-blue-500"></i>確認拆解方案</p>
                    <div class="modal-close cursor-pointer z-50 text-gray-500 hover:text-red-500 dark:text-gray-400 dark:hover:text-red-400" onclick="closeAutoSplitModal()">
                        <i class="fas fa-times text-xl"></i>
                    </div>
                </div>
                <div class="my-5 space-y-4">
                    <div class="flex justify-between items-center">
                        <p class="text-gray-600 text-sm dark:text-gray-300">目標零件: <span id="modalPartName" class="font-bold text-gray-800 text-base dark:text-white"></span></p>
                        <div class="flex items-center gap-2 bg-blue-50 px-3 py-1 rounded border border-blue-200 dark:bg-blue-900/30 dark:border-blue-800">
                            <span class="text-xs text-blue-800 dark:text-blue-200">拆解組數:</span>
                            <input type="number" id="splitQtyInput" inputmode="numeric" class="w-12 text-center border rounded text-sm p-1 bg-white dark:bg-gray-700 dark:border-gray-600 dark:text-white" value="1" min="1">
                            <span class="text-xs text-gray-500 dark:text-gray-400" id="splitQtyMax"></span>
                        </div>
                    </div>
                    
                    <p class="text-xs text-gray-500 dark:text-gray-400">系統已計算出最佳切割方式，請確認：</p>
                    
                    <!-- 最佳解顯示區 -->
                    <div id="bestSplitResult" class="bg-green-50 border border-green-200 rounded p-4 dark:bg-green-900/20 dark:border-green-800">
                        <!-- JS 會填入內容 -->
                    </div>
                </div>
                <div class="flex justify-end pt-2 gap-2">
                    <button onclick="closeAutoSplitModal()" class="px-4 py-2 bg-gray-200 text-gray-600 rounded hover:bg-gray-300 transition text-sm dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600">取消</button>
                    <button id="confirmSplitBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm font-bold shadow-md dark:bg-blue-600 dark:hover:bg-blue-500">
                        <i class="fas fa-check mr-1"></i>確認執行
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 排版圖詳情 Modal -->
    <div id="sheetDetailModal" class="modal fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-75 backdrop-blur-sm" onclick="closeSheetModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-6xl h-[90vh] mx-auto rounded shadow-lg z-50 overflow-hidden flex flex-col transform transition-all scale-100 dark:bg-gray-900">
            <!-- Header -->
            <div class="flex justify-between items-center py-3 px-6 border-b bg-gray-50 dark:bg-gray-800 dark:border-gray-700">
                <div>
                    <p class="text-2xl font-bold text-gray-800 dark:text-white" id="sheetDetailTitle">配置 X</p>
                    <p class="text-sm text-gray-500 dark:text-gray-400" id="sheetDetailSub">母材資料...</p>
                </div>
                <div class="modal-close cursor-pointer z-50 text-gray-500 hover:text-red-500 dark:text-gray-400 dark:hover:text-red-400" onclick="closeSheetModal()">
                    <i class="fas fa-times text-2xl"></i>
                </div>
            </div>
            
            <!-- Body -->
            <div class="flex-1 overflow-y-auto p-6 bg-gray-100 dark:bg-black/50">
                <div class="flex flex-col lg:flex-row gap-6">
                    <!-- 左側：大圖 -->
                    <div class="lg:w-2/3">
                        <div class="bg-white p-2 rounded shadow border border-gray-200 overflow-hidden dark:bg-gray-200 dark:border-gray-600" id="sheetCanvasWrapper">
                            <canvas id="detailCanvas"></canvas>
                        </div>
                    </div>
                    
                    <!-- 右側：清單 -->
                    <div class="lg:w-1/3">
                        <div class="bg-white rounded shadow border border-gray-200 p-4 dark:bg-gray-800 dark:border-gray-700">
                            <h4 class="font-bold text-gray-700 mb-3 border-b pb-2 dark:text-gray-200 dark:border-gray-600"><i class="fas fa-list mr-2"></i>切割明細 (Cut List)</h4>
                            <div id="sheetPartsList" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2 scrollbar-thin">
                                <!-- JS Generated -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-200 text-center p-4 text-xs text-gray-500 mt-10 dark:bg-gray-800 dark:text-gray-400 transition-colors">
        &copy; 2024 Steel Sheet Optimizer | 2D Bin Packing Algorithm
    </footer>
